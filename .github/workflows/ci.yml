name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Restore
        run: dotnet restore CashFlow.sln

      - name: Build
        run: dotnet build CashFlow.sln --configuration Release --no-restore

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-build
          path: |
            src/**/bin/Release/
            tests/**/bin/Release/
          if-no-files-found: error

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dotnet-build

      - name: Test
        run: dotnet test CashFlow.sln --configuration Release --no-build --verbosity normal --settings coverlet.runsettings --collect:"XPlat Code Coverage" --results-directory coverage-out

      - name: Check coverage threshold (80%)
        run: python3 scripts/check-coverage.py 80 coverage-out

  cleanup:
    runs-on: ubuntu-latest
    needs: [build, test]
    if: always() && needs.build.result == 'success'

    permissions:
      actions: write

    steps:
      - name: Delete build artifacts
        uses: geekyeggo/delete-artifact@v6
        with:
          name: dotnet-build
          failOnError: false