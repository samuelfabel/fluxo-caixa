name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Restore
        run: dotnet restore CashFlow.sln

      - name: Build
        run: dotnet build CashFlow.sln --configuration Release --no-restore

      - name: Test with coverage
        run: >
          dotnet test CashFlow.sln
          --configuration Release
          --no-build
          --verbosity normal
          --settings coverlet.runsettings
          --collect:"XPlat Code Coverage"
          --results-directory coverage-out

      - name: Check coverage threshold (80%)
        run: python3 scripts/check-coverage.py 80 coverage-out
